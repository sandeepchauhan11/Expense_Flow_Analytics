<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="styleheet">
</head>
<body>
  <div class="container">
    <h2>Expense Tracker</h2>

    <div class="balance-card">
      <h4>YOUR BALANCE</h4>
      <h1 id="balance">₹0.00</h1>
      <div class="inc-exp-container">
        <div>
          <h4>INCOME</h4>
          <p id="money-plus" class="money plus">+₹0.00</p>
        </div>
        <div>
          <h4>EXPENSE</h4>
          <p id="money-minus" class="money minus">-₹0.00</p>
        </div>
      </div>
    </div>

    <h3>Add New Transaction</h3>
    <form id="form">
      <div class="form-control">
        <label for="text">Transaction Name</label>
        <input type="text" id="text" placeholder="e.g. Salary, Rent, Groceries..." required />
      </div>
      <div class="form-control">
        <label for="amount">Amount <br>(Negative - expense, Positive + income)</label>
        <input type="number" id="amount" placeholder="e.g. -500 or 2000" required />
      </div>
      <button class="btn">Add Transaction</button>
    </form>

    <h3>Transaction History</h3>
    <ul id="list" class="list">
      <!-- JavaScript will inject items here dynamically -->
    </ul>
  </div>


  <script src="script.js"></script>
</body>
</html>
